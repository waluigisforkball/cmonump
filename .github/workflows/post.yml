name: ABS Dunk Bot

on:
  schedule:
    - cron: "0 14 * * *"
    - cron: "0 15 * * 1"
  workflow_dispatch:
    inputs:
      window:
        description: "day or week"
        required: true
        default: "day"
        type: choice
        options: [day, week]
      dry_run:
        description: "dry run (build but do not post)"
        required: false
        default: true
        type: boolean
      inspect:
        description: "inspect mode (print Savant columns, no post)"
        required: false
        default: false
        type: boolean
      feedinspect:
        description: "feed inspector (dump MLB Stats API challenge fields, no post)"
        required: false
        default: false
        type: boolean
      date:
        description: "anchor date YYYY-MM-DD (blank = yesterday)"
        required: false
        default: ""
        type: string

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run bot
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          EVENT_NAME: ${{ github.event_name }}
          CRON: ${{ github.event.schedule }}
          IN_WINDOW: ${{ github.event.inputs.window }}
          IN_DATE: ${{ github.event.inputs.date }}
          IN_INSPECT: ${{ github.event.inputs.inspect }}
          IN_FEEDINSPECT: ${{ github.event.inputs.feedinspect }}
          IN_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: python ci_run.py
      - name: Upload card
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: card
          path: card.png
          if-no-files-found: ignore
